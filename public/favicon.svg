<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#0d1628"/>
      <stop offset="100%" stop-color="#060a14"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="30%" cy="20%" r="70%">
      <stop offset="0%" stop-color="#105cff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#33d6ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <!-- Blue glow -->
  <rect width="32" height="32" rx="8" fill="url(#glow)"/>
  <!-- Top shine -->
  <rect width="32" height="32" rx="8" fill="url(#shine)"/>
  <!-- Border -->
  <rect x="0.5" y="0.5" width="31" height="31" rx="7.5" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1"/>

  <!-- KC text -->
  <text
    x="16"
    y="22"
    font-family="Arial Black, Arial, sans-serif"
    font-size="14"
    font-weight="900"
    fill="#f4f8ff"
    text-anchor="middle"
    letter-spacing="-0.8"
  >KC</text>
</svg>
